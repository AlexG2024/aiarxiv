name: Publish Due Post

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 8-17 * * *"
      timezone: "Europe/Moscow"

concurrency:
  group: aiarxiv-publish-due-post
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  publish-due-post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Publish one due post
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DRY_RUN: "false"
        run: python publish_due_post.py

      - name: Commit publishing state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- data; then
            echo "No publishing state changes"
            exit 0
          fi
          git add data/*.json
          git commit -m "chore: update publishing state"
          git pull --rebase origin main
          git push origin main
